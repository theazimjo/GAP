services:
  api:
    build:
      context: ./gap_backend
      dockerfile: Dockerfile
    container_name: gap_api
    restart: always
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: postgresql://admin:secret@db:5432/gapdb?schema=public
      JWT_SECRET: supersecretkey123
      PORT: 4000
      NODE_ENV: production
    command: /bin/sh -c "npx prisma db push && npm start"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - gap_network

  db:
    image: postgres:15-alpine
    container_name: gap_db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: gapdb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d gapdb"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - gap_network



networks:
  gap_network:
    driver: bridge

volumes:
  postgres_data:
